name: Convert images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq + xxd
        run: sudo apt-get update && sudo apt-get install -y jq xxd

      - name: Install ImageMagick with JXL delegate
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/imagemagick
          sudo apt-get update
          sudo apt-get install -y imagemagick libjxl-tools
          magick -version
          magick -list format | grep -i jxl

      - name: Convert images
        run: |
          ./convert.sh

      - name: Commit and push
        run: |
          git config user.name "IsraelGPT"
          git config user.email "trackers@artistgrid.cx"
          git add index.json jpg/ webp/ jxl/
          git diff --cached --quiet && exit 0
          git commit -m "[ci] Convert images to jpg/webp/jxl (500x500)"
          git push
